<title>Espiral Periódica — Moran</title>

<style>
:root {
  --bg: #0b0c12;
  --surface: #12131d;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf2;
  --muted: #5a6070;
  --accent: #8b7cf8;

  --alkali:          #d94f4f;
  --alkaline:        #d49030;
  --lanthanide:      #c46faa;
  --actinide:        #c45080;
  --transition:      #c97870;
  --post-transition: #7da87d;
  --metalloid:       #9db040;
  --polyatomic:      #48a86a;
  --diatomic:        #7db840;
  --noble:           #5090c0;
  --unknown:         #555;

  --hex-w: 64px;
  --hex-h: 74px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lexend', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(11,12,18,0.96);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 200;
  gap: 16px;
  flex-wrap: wrap;
}
header h1 { font-size:17px; font-weight:600; letter-spacing:.04em; }
header .sub { font-size:11px; color:var(--muted); font-family:'Fira Code',monospace; margin-top:2px; }
#search-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--text);
  font-family: 'Lexend', sans-serif;
  font-size: 12px;
  width: 200px;
  outline: none;
  transition: border-color .2s;
}
#search-bar:focus { border-color: var(--accent); }
#search-bar::placeholder { color: var(--muted); }

/* ── LEGEND ── */
#legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.leg-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px; color: var(--muted);
  cursor: pointer; transition: color .15s;
  user-select: none;
}
.leg-item:hover { color: var(--text); }
.leg-dot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }

/* ── LAYOUT ── */
#main { display: flex; }

#canvas-wrap {
  flex: 1;
  overflow: auto;
  padding: 32px 20px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* SVG canvas for the spiral */
#spiral-svg {
  display: block;
  overflow: visible;
}

/* ── HEX CELLS (SVG foreignObject approach → use SVG polygon + text) ── */

/* ── DETAIL PANEL ── */
#detail {
  width: 300px;
  min-height: calc(100vh - 100px);
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px 20px;
  position: sticky;
  top: 57px;
  height: calc(100vh - 57px);
  overflow-y: auto;
  flex-shrink: 0;
}
#detail.empty {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--muted);
}
.empty-icon { font-size: 40px; opacity: .25; }

.d-hex {
  width: 96px; height: 110px;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.d-hex .d-n { font-size:11px; font-family:'Fira Code',monospace; color:rgba(255,255,255,.65); }
.d-hex .d-s { font-size:34px; font-weight:700; color:#fff; line-height:1; }
.d-hex .d-nm { font-size:9px; color:rgba(255,255,255,.7); text-align:center; padding:0 6px; }

.d-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.d-cat { font-size:10px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
.d-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.d-box {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 11px;
}
.d-box.full { grid-column:1/-1; }
.d-label { font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
.d-val { font-size:13px; font-weight:600; font-family:'Fira Code',monospace; }
.d-cfg { font-size:11.5px; font-family:'Fira Code',monospace; color:var(--accent); }
.ox-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.ox { background:rgba(139,124,248,.12); border:1px solid rgba(139,124,248,.28);
      border-radius:4px; padding:2px 6px; font-size:10.5px; font-family:'Fira Code',monospace; color:var(--accent); }
.ox.c { background:rgba(139,124,248,.3); border-color:var(--accent); color:#fff; }
.d-desc { margin-top:14px; font-size:11.5px; color:var(--muted); line-height:1.65; }

/* ── TOOLTIP ── */
#tip {
  position:fixed; display:none;
  background:rgba(18,19,29,.96); border:1px solid var(--border);
  border-radius:7px; padding:7px 12px;
  font-size:11.5px; color:var(--text);
  pointer-events:none; z-index:9999;
  backdrop-filter:blur(8px); white-space:nowrap;
}

/* period/group labels */
.period-label, .group-label {
  font-size: 10px;
  font-family: 'Fira Code', monospace;
  fill: #4a5060;
}

@media(max-width:1000px){ #detail{ display:none; } }
</style>

};
const CAT_PT = {
  alkali:"Metal Alcalino", alkaline:"Metal Alcalino Terroso",
  lanthanide:"Lantanídeo", actinide:"Actinídeo",
  transition:"Metal de Transição", "post-transition":"Metal Pós-Transição",
  metalloid:"Semimetal", polyatomic:"Não-metal Poliatômico",
  diatomic:"Não-metal Diatômico", noble:"Gás Nobre", unknown:"Propriedades Desconhecidas"
};

/* ═══════════════════════════════════════════════════════════
   MORAN SPIRAL LAYOUT
   
   The Moran Periodic Spiral arranges elements in a continuous
   outward spiral. Each "arm" of the spiral corresponds to a
   chemical group (column in standard table). Elements grow
   outward from the center as atomic number increases, with
   each period forming a ring/loop around the center.
   
   Layout strategy:
   - Center: H(1), He(2) — period 1
   - Ring 2: Li→Ne (period 2, 8 elements)
   - Ring 3: Na→Ar (period 3, 8 elements)
   - Ring 4: K→Kr (period 4, 18 elements, includes d-block)
   - Ring 5: Rb→Xe (period 5, 18 elements)
   - Ring 6: Cs→Rn (period 6, 32 elements, includes f-block)
   - Ring 7: Fr→Og (period 7, 32 elements)
   
   We place each element at:
     angle = group_angle(group) + period_offset
     radius = base_radius(period) + f_block_push
   
═══════════════════════════════════════════════════════════ */

const SVG_NS = "http://www.w3.org/2000/svg";
const HW = 32; // hex half-width
const HH = 37; // hex half-height
const R_STEP = 88; // radial step per period
const BASE_R = 100; // center ring radius

// In Moran's spiral, groups 1-18 are distributed angularly.
// Group 1 (alkali) at ~270° (top), Noble gases at ~250°.
// The f-block inserts between groups 2 and 3 in periods 6-7.
// We'll map each element to (angle_deg, ring_r).

function spiralPos(el) {
  const {n, p, g, bl} = el;
  
  // Determine angular position based on group
  // 18 groups span 360°, starting at top
  // Group 1 → 270° (top-right), going clockwise
  
  // For f-block elements, they fit between group 2 and group 3
  // Lanthanides: p=6, groups 57-71 mapped to f-block positions
  // Actinides: p=7, groups 89-103
  
  let groupAngle;
  let ring;
  
  if (bl === "f") {
    // f-block: 14 elements, angle spread between g=2 and g=4
    // La(57)→Lu(71) and Ac(89)→Lr(103)
    let fIndex;
    if (n >= 57 && n <= 71) fIndex = n - 57; // 0-13
    else fIndex = n - 89; // 0-13
    
    // Spread f-block between 20° and 80° (between alkaline earth and transition metals)
    const fStart = groupToAngle(2) + 6;
    const fEnd = groupToAngle(4) - 6;
    groupAngle = fStart + (fIndex / 13) * (fEnd - fStart);
    ring = BASE_R + (p - 1) * R_STEP + 20; // slightly outward for f-block
  } else {
    groupAngle = groupToAngle(g);
    ring = BASE_R + (p - 1) * R_STEP;
    // Period 1: H and He at inner ring
    if (p === 1) ring = BASE_R - 30;
  }
  
  const rad = (groupAngle * Math.PI) / 180;
  return {
    x: ring * Math.cos(rad),
    y: ring * Math.sin(rad),
    ring,
    angle: groupAngle
  };
}

function groupToAngle(g) {
  // Map group 1→18 to angles 0°→360° clockwise from top
  // 0° = top (12 o'clock), clockwise
  // We want group 1 (alkali) at top, noble gases just before
  // Distribute 18 groups over 360°
  const totalGroups = 18;
  const anglePerGroup = 360 / totalGroups;
  // Start group 1 at -90° (top), going clockwise
  return -90 + (g - 1) * anglePerGroup;
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
let selectedEl = null;
let activeFilter = "all";

function hexPoints(cx, cy, hw, hh) {
  // Flat-top hexagon
  const w = hw, h = hh;
  return [
    [cx, cy - h],
    [cx + w, cy - h/2],
    [cx + w, cy + h/2],
    [cx, cy + h],
    [cx - w, cy + h/2],
    [cx - w, cy - h/2],
  ].map(p => p.join(",")).join(" ");
}

function buildLegend() {
  const leg = document.getElementById("legend");
  Object.entries(CAT_PT).forEach(([cat, label]) => {
    const d = document.createElement("div");
    d.className = "leg-item";
    d.dataset.cat = cat;
    d.innerHTML = `<div class="leg-dot" style="background:${CAT_COLOR[cat]}"></div>${label}`;
    d.addEventListener("mouseenter", () => highlightCat(cat));
    d.addEventListener("mouseleave", () => restoreFilter());
    leg.appendChild(d);
  });
}

function buildSpiral() {
  const svg = document.getElementById("spiral-svg");
  svg.innerHTML = "";
  
  // Calculate bounds
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  ELEMENTS.forEach(el => {
    const pos = spiralPos(el);
    minX = Math.min(minX, pos.x - HW - 4);
    minY = Math.min(minY, pos.y - HH - 4);
    maxX = Math.max(maxX, pos.x + HW + 4);
    maxY = Math.max(maxY, pos.y + HH + 4);
  });
  
  const pad = 60;
  const W = maxX - minX + pad*2;
  const H = maxY - minY + pad*2;
  const offX = -minX + pad;
  const offY = -minY + pad;
  
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  
  // Draw faint spiral guide lines (concentric rings per period)
  const guideG = document.createElementNS(SVG_NS, "g");
  guideG.setAttribute("opacity", "0.08");
  for (let period=1; period<=7; period++) {
    const r = BASE_R + (period-1)*R_STEP - (period===1 ? 30 : 0);
    const circle = document.createElementNS(SVG_NS, "circle");
    circle.setAttribute("cx", offX);
    circle.setAttribute("cy", offY);
    circle.setAttribute("r", r);
    circle.setAttribute("fill", "none");
    circle.setAttribute("stroke", "#ffffff");
    circle.setAttribute("stroke-width", "0.5");
    guideG.appendChild(circle);
  }
  svg.appendChild(guideG);
  
  // Period labels
  for (let period=1; period<=7; period++) {
    const r = BASE_R + (period-1)*R_STEP - (period===1 ? 30 : 0);
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", offX + 5);
    t.setAttribute("y", offY - r + 14);
    t.setAttribute("class", "period-label");
    t.setAttribute("text-anchor", "middle");
    t.textContent = `${period}º`;
    svg.appendChild(t);
  }
  
  // Draw group radial lines (faint)
  const radG = document.createElementNS(SVG_NS, "g");
  radG.setAttribute("opacity", "0.04");
  for (let g=1; g<=18; g++) {
    const angle = (groupToAngle(g) * Math.PI) / 180;
    const r1 = BASE_R - 60;
    const r2 = BASE_R + 6*R_STEP + 60;
    const line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", offX + r1*Math.cos(angle));
    line.setAttribute("y1", offY + r1*Math.sin(angle));
    line.setAttribute("x2", offX + r2*Math.cos(angle));
    line.setAttribute("y2", offY + r2*Math.sin(angle));
    line.setAttribute("stroke", "#ffffff");
    line.setAttribute("stroke-width", "1");
    radG.appendChild(line);
  }
  svg.appendChild(radG);
  
  // Group number labels at outer edge
  for (let g=1; g<=18; g++) {
    const angle = (groupToAngle(g) * Math.PI) / 180;
    const r = BASE_R + 6*R_STEP + 55;
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", offX + r*Math.cos(angle));
    t.setAttribute("y", offY + r*Math.sin(angle) + 4);
    t.setAttribute("class", "group-label");
    t.setAttribute("text-anchor", "middle");
    t.textContent = g;
    svg.appendChild(t);
  }
  
  // Draw hexagons
  const hexG = document.createElementNS(SVG_NS, "g");
  
  ELEMENTS.forEach(el => {
    const pos = spiralPos(el);
    const cx = pos.x + offX;
    const cy = pos.y + offY;
    const color = CAT_COLOR[el.cat] || "#555";
    
    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("class", `hex-group`);
    g.dataset.n = el.n;
    g.dataset.cat = el.cat;
    g.style.cursor = "pointer";
    
    // Hex polygon
    const poly = document.createElementNS(SVG_NS, "polygon");
    poly.setAttribute("points", hexPoints(cx, cy, HW, HH));
    poly.setAttribute("fill", color);
    poly.setAttribute("stroke", "rgba(0,0,0,0.3)");
    poly.setAttribute("stroke-width", "1");
    poly.style.transition = "opacity 0.15s";
    
    // Number
    const tNum = document.createElementNS(SVG_NS, "text");
    tNum.setAttribute("x", cx);
    tNum.setAttribute("y", cy - 13);
    tNum.setAttribute("text-anchor", "middle");
    tNum.setAttribute("fill", "rgba(255,255,255,0.65)");
    tNum.setAttribute("font-family", "Fira Code, monospace");
    tNum.setAttribute("font-size", "8");
    tNum.textContent = el.n;
    
    // Symbol
    const tSym = document.createElementNS(SVG_NS, "text");
    tSym.setAttribute("x", cx);
    tSym.setAttribute("y", cy + 6);
    tSym.setAttribute("text-anchor", "middle");
    tSym.setAttribute("fill", "#ffffff");
    tSym.setAttribute("font-family", "Lexend, sans-serif");
    tSym.setAttribute("font-weight", "700");
    tSym.setAttribute("font-size", "16");
    tSym.textContent = el.sym;
    
    // Short config
    const shortCfg = el.cfg.replace(/\[.*?\]\s?/, "").slice(0, 7);
    const tCfg = document.createElementNS(SVG_NS, "text");
    tCfg.setAttribute("x", cx);
    tCfg.setAttribute("y", cy + 20);
    tCfg.setAttribute("text-anchor", "middle");
    tCfg.setAttribute("fill", "rgba(255,255,255,0.5)");
    tCfg.setAttribute("font-family", "Fira Code, monospace");
    tCfg.setAttribute("font-size", "6");
    tCfg.textContent = shortCfg;
    
    g.appendChild(poly);
    g.appendChild(tNum);
    g.appendChild(tSym);
    g.appendChild(tCfg);
    
    // Events
    g.addEventListener("click", () => selectEl(el, poly));
    g.addEventListener("mouseenter", (e) => {
      if (!g.classList.contains("dimmed")) {
        poly.setAttribute("stroke", "#fff");
        poly.setAttribute("stroke-width", "2");
        showTip(e, el);
      }
    });
    g.addEventListener("mouseleave", () => {
      poly.setAttribute("stroke", "rgba(0,0,0,0.3)");
      poly.setAttribute("stroke-width", "1");
      hideTip();
    });
    
    hexG.appendChild(g);
  });
  
  svg.appendChild(hexG);
}

function selectEl(el, polyEl) {
  selectedEl = el;
  // Reset all outlines
  document.querySelectorAll(".hex-group polygon").forEach(p => {
    p.setAttribute("stroke", "rgba(0,0,0,0.3)");
    p.setAttribute("stroke-width", "1");
  });
  if (polyEl) {
    polyEl.setAttribute("stroke", "#8b7cf8");
    polyEl.setAttribute("stroke-width", "2.5");
  }
  renderDetail(el);
}

function renderDetail(el) {
  const panel = document.getElementById("detail");
  panel.classList.remove("empty");
  const color = CAT_COLOR[el.cat] || "#555";
  
  const oxHtml = el.ox.map(o => {
    const c = el.cox.includes(o) ? "c" : "";
    return `<span class="ox ${c}">${o>0?"+":""}${o}</span>`;
  }).join("");
  
  panel.innerHTML = `
    <div class="d-hex cat-${el.cat}" style="background:${color}">
      <div class="d-n">${el.n}</div>
      <div class="d-s">${el.sym}</div>
      <div class="d-nm">${el.name}</div>
    </div>
    <div class="d-title">${el.name}</div>
    <div class="d-cat" style="color:${color}">${CAT_PT[el.cat]||el.cat}</div>
    <div class="d-grid">
      <div class="d-box"><div class="d-label">Nº Atômico</div><div class="d-val">${el.n}</div></div>
      <div class="d-box"><div class="d-label">Massa</div><div class="d-val">${el.mass} u</div></div>
      <div class="d-box"><div class="d-label">Período</div><div class="d-val">${el.p}</div></div>
      <div class="d-box"><div class="d-label">Grupo</div><div class="d-val">${el.g} · Bloco ${el.bl.toUpperCase()}</div></div>
      <div class="d-box"><div class="d-label">Fusão</div><div class="d-val">${el.melt !== null ? el.melt+"°C" : "—"}</div></div>
      <div class="d-box"><div class="d-label">Ebulição</div><div class="d-val">${el.boil !== null ? el.boil+"°C" : "—"}</div></div>
      <div class="d-box full"><div class="d-label">Configuração Eletrônica</div><div class="d-cfg">${el.cfg}</div></div>
      ${el.ox.length ? `<div class="d-box full"><div class="d-label">Estados de Oxidação</div><div class="ox-row">${oxHtml}</div><div style="font-size:9px;color:var(--muted);margin-top:5px"><span style="background:rgba(139,124,248,.3);border-radius:2px;padding:1px 4px;color:#fff">destaque</span> = mais comuns</div></div>` : ""}
    </div>
    <div class="d-desc">${el.desc}</div>
  `;
}

function highlightCat(cat) {
  document.querySelectorAll(".hex-group").forEach(g => {
    g.classList.toggle("dimmed", g.dataset.cat !== cat);
    g.style.opacity = g.dataset.cat === cat ? "1" : "0.15";
  });
}

function restoreFilter() {
  document.querySelectorAll(".hex-group").forEach(g => {
    if (activeFilter === "all") {
      g.style.opacity = "1";
      g.classList.remove("dimmed");
    } else {
      const match = g.dataset.cat === activeFilter;
      g.style.opacity = match ? "1" : "0.15";
      g.classList.toggle("dimmed", !match);
    }
  });
}

// Tooltip
const tip = document.getElementById("tip");
function showTip(e, el) {
  tip.textContent = `${el.n} · ${el.sym} · ${el.name} · ${el.mass} u`;
  tip.style.display = "block";
  moveTip(e);
}
function hideTip() { tip.style.display = "none"; }
function moveTip(e) {
  tip.style.left = (e.clientX + 14) + "px";
  tip.style.top = (e.clientY - 28) + "px";
}
document.addEventListener("mousemove", moveTip);

// Search
document.getElementById("search-bar").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll(".hex-group").forEach(g => {
    const el = ELEMENTS.find(e => e.n === parseInt(g.dataset.n));
    if (!q) {
      g.style.opacity = "1"; g.classList.remove("dimmed");
      return;
    }
    const match = el.sym.toLowerCase().includes(q) || el.name.toLowerCase().includes(q) || String(el.n).includes(q);
    g.style.opacity = match ? "1" : "0.12";
    g.classList.toggle("dimmed", !match);
  });
});

// Init
buildLegend();
buildSpiral();

// Default select
setTimeout(() => {
  const ir = ELEMENTS.find(e => e.n === 77);
  const poly = document.querySelector('[data-n="77"] polygon');
  selectEl(ir, poly);
}, 300);
</script>
</body>
</html>
