<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Recorrente — Brasil 1999–2026 | Análise Estrutural</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #050505;
            --bg2: #0e0e10;
            --bg3: #161618;
            --accent: #00d9ff;
            --accent-red: #ff4d4d;
            --accent-amber: #ffcc00;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f5;
            --text-dim: #8b9099;
            --font: 'Syne', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            padding: 48px 32px 32px;
            background: linear-gradient(180deg, rgba(0, 217, 255, 0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }

        .hbadge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        header h1 {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 8px;
        }

        header h1 span { color: var(--accent); }

        .hmeta {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        nav {
            display: flex;
            gap: 8px;
            padding: 12px 32px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nb {
            padding: 8px 16px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nb.act { background: rgba(0, 217, 255, 0.1); border-color: rgba(0, 217, 255, 0.2); color: var(--accent); }

        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        .sec { display: none; animation: fadeIn 0.3s ease-out; }
        .sec.act { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .kgrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .kcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .klabel { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .kval { font-size: 24px; font-weight: 800; color: var(--text); }

        /* TIMELINE STYLE */
        .cycle-list { display: flex; flex-direction: column; gap: 8px; }
        .cycle-item {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cycle-item:hover { border-color: var(--accent); }
        .cycle-header { display: flex; align-items: center; gap: 16px; justify-content: space-between; }
        .cycle-year { font-family: var(--mono); font-size: 14px; color: var(--accent); font-weight: 700; width: 60px; }
        .cycle-op { font-size: 15px; font-weight: 700; flex: 1; }
        .cycle-body { display: none; padding-top: 16px; margin-top: 16px; border-top: 1px solid var(--border); }
        .cycle-item.act .cycle-body { display: block; }

        /* MATRIX STYLE */
        .matrix-wrap { overflow-x: auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; }
        .matrix-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
        .matrix-table th { padding: 12px; text-align: left; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .matrix-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .dot-p { color: var(--accent-red); font-weight: 800; }
        .dot-a { color: var(--text-dim); }

        /* GRID COMPONENTS */
        .pgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media(max-width: 768px) { .pgrid { grid-template-columns: 1fr; } }
        .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
        .ptitle { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

        .footer { margin-top: 80px; padding: 48px; text-align: center; opacity: 0.5; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="hbadge">👁️ Análise Sistêmica • Rede Recorrente</div>
    <h1>O Ciclo da <span>Impunidade</span></h1>
    <div class="hmeta">
        <span><b>Período:</b> 1999–2026</span>
        <span><b>Ciclos Documentados:</b> 9</span>
        <span><b>Padrão:</b> Recidiva Estrutural</span>
    </div>
</header>

<nav>
    <button class="nb act" onclick="switchSec('ciclos', this)">Ciclos Históricos</button>
    <button class="nb" onclick="switchSec('atores', this)">Matriz de Atores</button>
    <button class="nb" onclick="switchSec('padroes', this)">Padrões</button>
    <button class="nb" onclick="switchSec('perguntas', this)">Questões Abertas</button>
</nav>

<main>
    <!-- CICLOS -->
    <div id="sec-ciclos" class="sec act">
        <div class="kgrid">
            <div class="kcard"><div class="klabel">Início</div><div class="kval">1999</div></div>
            <div class="kcard"><div class="klabel">Atual</div><div class="kval">2026</div></div>
            <div class="kcard"><div class="klabel">Impacto</div><div class="kval">Sistêmico</div></div>
            <div class="kcard"><div class="klabel">Frequência</div><div class="kval">±3 Anos</div></div>
        </div>
        <div class="cycle-list" id="cycle-list"></div>
    </div>

    <!-- ATORES -->
    <div id="sec-atores" class="sec">
        <div class="matrix-wrap">
            <table class="matrix-table" id="matrix-table">
                <thead><tr id="matrix-head"></tr></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <!-- PADRÕES -->
    <div id="sec-padroes" class="sec">
        <div class="pgrid" id="padroes-grid"></div>
    </div>

    <!-- PERGUNTAS -->
    <div id="sec-perguntas" class="sec">
        <div class="pgrid" id="perguntas-grid"></div>
    </div>
</main>

<footer class="footer">
    <div style="font-size:18px; font-weight:800; margin-bottom:10px;">Observatório <span>Civil BR</span></div>
    <div style="font-size:12px; font-family:var(--mono);">© 2026 • CC0 Domínio Público</div>
</footer>

<script>
    const CYCLES = [
        {id:'marka', year:'1999', op:'Banco Marka', title:'Crise Cambial — Bacen salva banqueiro'},
        {id:'santos', year:'2004', op:'Banco Santos', title:'Pirâmide de passivos socializada'},
        {id:'mensalao', year:'2005', op:'Mensalão', title:'Financiamento de base parlamentar'},
        {id:'satiagraha', year:'2008', op:'Satiagraha', title:'Opportunity — HC em 48 horas'},
        {id:'castelo', year:'2009', op:'Castelo de Areia', title:'Camargo Corrêa — anulação vício'},
        {id:'lavajato', year:'2014', op:'Lava Jato', title:'Petrobras — o maior esquema'},
        {id:'inss', year:'2025', op:'Op. Sem Desconto', title:'Fraude consignados e Master'},
        {id:'master', year:'2026', op:'Compliance Zero', title:'Master — o rombo de R$51bi'}
    ];

    const ACTORS = [
        {name:'José Dirceu', cycles:{mensalao:'P', lavajato:'P'}},
        {name:'Antonio Palocci', cycles:{castelo:'P', lavajato:'P'}},
        {name:'Marcos Valério', cycles:{mensalao:'P'}},
        {name:'Daniel Vorcaro', cycles:{inss:'A', master:'P'}},
        {name:'Dias Toffoli', cycles:{lavajato:'A', master:'A'}},
        {name:'Gilmar Mendes', cycles:{satiagraha:'A', lavajato:'A'}},
        {name:'Alberto Youssef', cycles:{lavajato:'P'}}
    ];

    const PADROES = [
        {id:'P-01', t:'Anulação Processual', d:'Defesa ataca a forma, não o mérito.'},
        {id:'P-02', t:'Investigador Réu', d:'Quem investiga acaba processado ou expulso.'},
        {id:'P-03', t:'Captura Judicial', d:'Vínculos financeiros com relatores garantem sigilo.'},
        {id:'P-04', t:'Socialização do Rombo', d:'Prejuízo privado vira dívida pública (FGC).'}
    ];

    function renderCycles() {
        const list = document.getElementById('cycle-list');
        CYCLES.forEach(c => {
            list.innerHTML += `<div class="cycle-item" onclick="this.classList.toggle('act')">
                <div class="cycle-header">
                    <span class="cycle-year">${c.year}</span>
                    <span class="cycle-op">${c.op}</span>
                    <span style="font-size:11px; color:var(--text-dim);">[ CLIQUE PARA DETALHAR ]</span>
                </div>
                <div class="cycle-body">
                    <p style="font-size:14px; color:var(--text-dim);">${c.title}</p>
                    <div style="margin-top:12px; font-family:var(--mono); font-size:11px; color:var(--accent);">PADRÃO DOCUMENTADO: RECIDIVA</div>
                </div>
            </div>`;
        });
    }

    function renderMatrix() {
        const head = document.getElementById('matrix-head');
        const body = document.getElementById('matrix-body');
        const cKeys = CYCLES.map(c => c.id);
        head.innerHTML = '<th>Ator</th>' + CYCLES.map(c => `<th>${c.year}</th>`).join('');
        ACTORS.forEach(a => {
            let row = `<td>${a.name}</td>`;
            cKeys.forEach(k => {
                const s = a.cycles[k];
                row += `<td>${s === 'P' ? '<span class="dot-p">●</span>' : s === 'A' ? '<span class="dot-a">◌</span>' : '—'}</td>`;
            });
            body.innerHTML += `<tr>${row}</tr>`;
        });
    }

    function renderGrids() {
        const pGrid = document.getElementById('padroes-grid');
        PADROES.forEach(p => {
            pGrid.innerHTML += `<div class="panel"><div class="ptitle"><span class="dot"></span>${p.id}: ${p.t}</div><p style="font-size:14px; color:var(--text-dim);">${p.d}</p></div>`;
        });
        const qGrid = document.getElementById('perguntas-grid');
        [1,2,3,4].forEach(i => {
            qGrid.innerHTML += `<div class="panel"><div class="ptitle"><span class="dot" style="background:var(--accent-amber)"></span>Questão ${i}</div><p style="font-size:14px; color:var(--text-dim);">A pergunta que o sistema impede de ser feita sobre os beneficiários finais.</p></div>`;
        });
    }

    function switchSec(id, btn) {
        document.querySelectorAll('.sec').forEach(s => s.classList.remove('act'));
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('act'));
        document.getElementById('sec-' + id).classList.add('act');
        btn.classList.add('act');
    }

    renderCycles();
    renderMatrix();
    renderGrids();
</script>
<script src="https://gosurf.site/counter.js"></script>
</body>
</html>
