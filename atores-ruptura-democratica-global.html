function renderTabs() {
  document.getElementById('tabs').innerHTML = cats.map(c =>
    `<button class="tab ${activeTab===c.id?'active':''}" onclick="setTab('${c.id}')">${c.label}</button>`
  ).join('');
}

function setTab(t) { activeTab = t; openCard = null; renderTabs(); renderGrid(); }

function toggle(name) { openCard = openCard === name ? null : name; renderGrid(); }

function renderGrid() {
  const filtered = atores.filter(a => activeTab === "todos" || a.cat === activeTab);
  document.getElementById('counter').textContent = `${filtered.length} atores exibidos`;
  document.getElementById('grid').innerHTML = filtered.map(a => {
    const isOpen = openCard === a.name;
    const paisList = a.paises.slice(0,6).join(', ') + (a.paises.length > 6 ? ` +${a.paises.length-6}` : '');
    const detail = isOpen ? `
      <div class="expand">
        <div class="detail-grid">
          <div class="dbox"><div class="dlabel">Mecanismo</div><div class="dval">${a.mecanismo}</div></div>
          <div class="dbox"><div class="dlabel">Conexões</div><div class="dval">${a.conexoes}</div></div>
          <div class="dbox"><div class="dlabel">Eventos documentados</div><div class="dval">${a.eventos}</div></div>
          <div class="dbox"><div class="dlabel">Nível de operação</div><div class="dval">${a.nivel}</div></div>
        </div>
        <span class="close-btn" onclick="event.stopPropagation();toggle('${a.name.replace(/'/g,"\\'")}')">▲ recolher</span>
      </div>` : '';
    return `<div class="card ${isOpen?'open':''}" onclick="toggle('${a.name.replace(/'/g,"\\'")}')">
      <div class="card-top">
        <div class="icon ${a.icon}">★</div>
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-type">${a.tipo}</div>
        </div>
      </div>
      <div class="reach">${a.paises.slice(0,5).map(p => `<span class="reach-tag">${p}</span>`).join('')}${a.paises.length>5?`<span class="reach-tag">+${a.paises.length-5}</span>`:''}</div>
      <div class="card-desc">${a.desc}</div>
      ${detail}
    </div>`;
  }).join('');
}
