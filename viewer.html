<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador — Observatório Civil BR</title>

<!-- PRIMARY META -->
<meta name="description" content="Visualizador de documentos investigativos — Observatório Civil BR">
<meta name="robots"      content="noindex, follow">
<meta name="theme-color" content="#dc2626">
<link rel="canonical"    href="https://painel-do-crime.vercel.app/viewer.html">

<!-- OPEN GRAPH (dinâmico via JS no loadFile) -->
<meta property="og:site_name"  content="Observatório Civil BR">
<meta property="og:type"       content="article">
<meta property="og:image"      content="https://painel-do-crime.vercel.app/og-image.png">
<meta property="og:locale"     content="pt_BR">
<meta name="twitter:card"      content="summary_large_image">
<meta name="twitter:image"     content="https://painel-do-crime.vercel.app/og-image.png">

<!-- PWA -->
<link rel="manifest"           href="manifest.json">
<link rel="icon"               href="favicon.ico" sizes="any">
<link rel="icon"               href="icons/icon-32.png" type="image/png">
<link rel="apple-touch-icon"   href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title"   content="ObsCivil BR">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg-void: #07080a;
    --bg-deep: #0d0f13;
    --bg-surface: #131619;
    --bg-raised: #1a1d22;
    --bg-card: #1e2128;
    --border-dim: rgba(255,255,255,0.06);
    --border-mid: rgba(255,255,255,0.10);
    --border-hot: rgba(220,38,38,0.35);
    --red-core: #dc2626;
    --red-bright: #ef4444;
    --red-glow: rgba(220,38,38,0.10);
    --amber: #f59e0b;
    --green: #22c55e;
    --blue: #60a5fa;
    --text-primary: #f0f2f5;
    --text-secondary: #9ba3ae;
    --text-muted: #4f5560;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --sans: 'Syne', sans-serif;
    --serif: 'Merriweather', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-dim);
    padding: 0 40px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border: 1px solid var(--border-dim);
    border-radius: 5px;
    background: var(--bg-raised);
    transition: all 0.15s;
  }
  .back-btn:hover {
    color: var(--text-primary);
    border-color: var(--border-mid);
  }
  .back-btn::before { content: '←'; }
  .topbar-brand {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .topbar-brand span { color: var(--red-core); }
  .topbar-file {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* LAYOUT */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 56px 40px 100px;
  }

  /* LOADING / ERROR */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    gap: 16px;
    text-align: center;
  }
  .state-icon { font-size: 40px; opacity: 0.4; }
  .state-title {
    font-family: var(--display);
    font-size: 28px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .state-desc {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    max-width: 400px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border-dim);
    border-top-color: var(--red-core);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ARTICLE HEADER */
  .article-header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border-dim);
  }
  .article-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .article-cat {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red-bright);
    padding: 3px 9px;
    border: 1px solid rgba(220,38,38,0.3);
    border-radius: 4px;
    background: var(--red-glow);
  }
  .article-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .article-title {
    font-family: var(--sans);
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .article-desc {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.65;
    max-width: 640px;
    font-weight: 400;
  }
  .article-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .article-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-primary);
    text-decoration: none;
    padding: 8px 16px;
    background: var(--bg-raised);
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    transition: all 0.15s;
  }
  .article-link:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(245,158,11,0.06);
  }
  .article-link::before { content: '↗'; opacity: 0.6; }

  /* TAGS */
  .article-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .article-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 3px 8px;
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    background: var(--bg-raised);
  }

  /* MARKDOWN CONTENT */
  .article-body {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--text-secondary);
  }

  .article-body h1,
  .article-body h2,
  .article-body h3,
  .article-body h4,
  .article-body h5,
  .article-body h6 {
    font-family: var(--sans);
    color: var(--text-primary);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin-top: 2em;
    margin-bottom: 0.6em;
  }
  .article-body h1 { font-size: 28px; border-bottom: 1px solid var(--border-dim); padding-bottom: 12px; margin-bottom: 20px; }
  .article-body h2 { font-size: 22px; }
  .article-body h3 { font-size: 18px; color: var(--text-primary); }
  .article-body h4 { font-size: 15px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--mono); }

  .article-body p { margin-bottom: 1.3em; }

  .article-body a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px solid rgba(96,165,250,0.3);
    transition: border-color 0.15s, color 0.15s;
  }
  .article-body a:hover {
    color: #93c5fd;
    border-bottom-color: rgba(147,197,253,0.5);
  }

  .article-body strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .article-body em {
    color: var(--amber);
    font-style: italic;
  }

  .article-body code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    padding: 2px 6px;
    border-radius: 4px;
    color: #a5b4fc;
    white-space: nowrap;
  }

  .article-body pre {
    background: var(--bg-surface);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
    margin: 1.5em 0;
  }
  .article-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: pre;
  }

  .article-body blockquote {
    border-left: 3px solid var(--red-core);
    padding: 4px 0 4px 20px;
    margin: 1.5em 0;
    background: linear-gradient(90deg, var(--red-glow), transparent);
    border-radius: 0 6px 6px 0;
  }
  .article-body blockquote p {
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 0;
  }

  .article-body ul,
  .article-body ol {
    padding-left: 1.5em;
    margin-bottom: 1.3em;
  }
  .article-body li {
    margin-bottom: 0.4em;
    color: var(--text-secondary);
  }
  .article-body li strong { color: var(--text-primary); }

  .article-body ul li::marker { color: var(--red-core); }
  .article-body ol li::marker {
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-family: var(--sans);
    font-size: 13px;
  }
  .article-body th {
    background: var(--bg-surface);
    border: 1px solid var(--border-dim);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .article-body td {
    border: 1px solid var(--border-dim);
    padding: 10px 14px;
    color: var(--text-secondary);
    vertical-align: top;
    line-height: 1.5;
  }
  .article-body tr:hover td { background: rgba(255,255,255,0.02); }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border-dim);
    margin: 2.5em 0;
  }

  .article-body img {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border-dim);
    display: block;
    margin: 1.5em auto;
  }

  /* FOOTNOTE / PROMPT Jekyll SYNTAX */
  .article-body .prompt-tip,
  .article-body .prompt-info,
  .article-body .prompt-warning,
  .article-body .prompt-danger {
    padding: 14px 18px;
    border-radius: 6px;
    margin: 1.5em 0;
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
  }

  /* PROGRESS READING */
  .reading-bar {
    position: fixed;
    top: 52px;
    left: 0;
    height: 2px;
    background: var(--red-core);
    width: 0%;
    transition: width 0.1s linear;
    z-index: 99;
  }

  /* FOOTER NAV */
  .article-footer {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer-brand {
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .footer-brand span { color: var(--red-core); }
  .footer-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    letter-spacing: 0.05em;
    line-height: 1.7;
  }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 40px;
    height: 40px;
    background: var(--bg-raised);
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-muted);
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }
  .scroll-top.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .scroll-top:hover {
    color: var(--text-primary);
    border-color: var(--red-core);
    background: var(--red-glow);
  }

  @media (max-width: 640px) {
    .page { padding: 32px 20px 80px; }
    .topbar { padding: 0 20px; }
    .article-title { font-size: 26px; }
    .article-body { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="reading-bar" id="reading-bar"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">OBSERVATÓRIO CIVIL BR</a>
    <div class="topbar-brand">OBSERVATÓRIO <span>CIVIL BR</span></div>
  </div>
  <div class="topbar-file" id="topbar-file">—</div>
</div>

<!-- CONTENT -->
<div class="page" id="page-content">
  <div class="state-box" id="loading-state">
    <div class="spinner"></div>
    <div class="state-title">CARREGANDO</div>
    <div class="state-desc">Buscando e renderizando o documento...</div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ─── MARKED CONFIG ───────────────────────────────────────────────────────────
marked.setOptions({
  gfm: true,
  breaks: true,
  pedantic: false,
});

// ─── YAML FRONTMATTER PARSER ─────────────────────────────────────────────────
function parseFrontmatter(text) {
  const fm = {};
  let body = text;

  const match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if (match) {
    const yamlStr = match[1];
    body = match[2];

    // Parse simple YAML key-value pairs
    yamlStr.split('\n').forEach(line => {
      const kv = line.match(/^(\w[\w\-]*)\s*:\s*(.*)$/);
      if (kv) {
        const key = kv[1].trim();
        let val = kv[2].trim().replace(/^["']|["']$/g, '');
        fm[key] = val;
      }
      // Parse array items (tags: [a, b])
      const arr = line.match(/^(\w+)\s*:\s*\[(.+)\]$/);
      if (arr) {
        fm[arr[1]] = arr[2].split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
      }
    });

    // Parse links block (multi-line)
    const linksMatch = yamlStr.match(/links:\s*\n((?:\s+-[^\n]+\n?)+)/);
    if (linksMatch) {
      const linkLines = linksMatch[1].trim().split('\n');
      const links = [];
      let currentLink = {};
      linkLines.forEach(l => {
        const titleMatch = l.match(/title:\s*(.+)/);
        const urlMatch   = l.match(/url:\s*(.+)/);
        if (titleMatch) currentLink.title = titleMatch[1].trim().replace(/^["']|["']$/g, '');
        if (urlMatch)   { currentLink.url = urlMatch[1].trim(); links.push({...currentLink}); currentLink = {}; }
      });
      fm.links = links;
    }
  }

  return { frontmatter: fm, body };
}

// ─── CLEAN JEKYLL SYNTAX ─────────────────────────────────────────────────────
function cleanJekyll(text) {
  return text
    .replace(/\{:\s*\.[\w\-]+\s*\}/g, '')           // {: .class}
    .replace(/\{:\s*toc[^\}]*\}/g, '')               // {:toc}
    .replace(/\{#[\w\-]+\}/g, '')                    // {#id}
    .replace(/~~(.+?)~~/g, '<del>$1</del>')          // ~~strike~~
    .replace(/^- &nbsp;\s*$/gm, '')                  // - &nbsp; placeholders
    .replace(/\{:\s*\.prompt-(tip|info|warning|danger)\s*\}/g, '')  // prompt classes
    .trim();
}

// ─── FORMAT DATE ─────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return null;
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return dateStr; }
}

// ─── RENDER ARTICLE ──────────────────────────────────────────────────────────
function renderArticle(fm, bodyMd) {
  const page = document.getElementById('page-content');

  const tags = Array.isArray(fm.tags) ? fm.tags : (fm.tags ? [fm.tags] : []);
  const links = Array.isArray(fm.links) ? fm.links : [];
  const dateStr = formatDate(fm.date);

  const eyebrow = `
    <div class="article-eyebrow">
      ${fm.categories ? `<span class="article-cat">${fm.categories.toUpperCase()}</span>` : '<span class="article-cat">ANÁLISE</span>'}
      ${dateStr ? `<span class="article-date">${dateStr}</span>` : ''}
    </div>
  `;

  const externalLinks = links.length > 0 ? `
    <div class="article-links">
      ${links.map(l => `<a class="article-link" href="${l.url}" target="_blank" rel="noopener">${l.title || l.url}</a>`).join('')}
    </div>
  ` : '';

  const tagRow = tags.length > 0 ? `
    <div class="article-tags">
      ${tags.map(t => `<span class="article-tag">#${t}</span>`).join('')}
    </div>
  ` : '';

  const header = `
    <div class="article-header">
      ${eyebrow}
      <h1 class="article-title">${fm.title || 'Documento'}</h1>
      ${fm.description ? `<p class="article-desc">${fm.description}</p>` : ''}
      ${externalLinks}
      ${tagRow}
    </div>
  `;

  const rendered = marked.parse(cleanJekyll(bodyMd));

  const footer = `
    <div class="article-footer">
      <a class="back-btn" href="index.html" style="font-size:12px;">← Voltar ao Painel</a>
      <div>
        <div class="footer-brand">OBSERVATÓRIO <span>CIVIL BR</span></div>
        <div class="footer-note">
          Documento de análise baseado em fontes públicas<br>
          Observatório Civil BR // BR-001 // ${new Date().getFullYear()}
        </div>
      </div>
    </div>
  `;

  page.innerHTML = `${header}<div class="article-body">${rendered}</div>${footer}`;

  // Update page title
  if (fm.title) document.title = `${fm.title} — Observatório Civil BR`;
}

// ─── MAIN LOADER ─────────────────────────────────────────────────────────────
async function loadFile() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const page = document.getElementById('page-content');

  if (!file) {
    page.innerHTML = `
      <div class="state-box">
        <div class="state-icon">📂</div>
        <div class="state-title">NENHUM ARQUIVO</div>
        <div class="state-desc">Use ?file=caminho/para/arquivo.md na URL<br>ou <a href="index.html" style="color:var(--red-bright)">volte ao painel</a>.</div>
      </div>`;
    return;
  }

  document.getElementById('topbar-file').textContent = file;

  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.text();
    const { frontmatter, body } = parseFrontmatter(raw);
    renderArticle(frontmatter, body);
  } catch (err) {
    page.innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">ERRO AO CARREGAR</div>
        <div class="state-desc">${err.message}<br><br>
          <a href="index.html" style="color:var(--red-bright);font-family:var(--mono);font-size:12px;">← Voltar ao Painel</a>
        </div>
      </div>`;
  }
}

// ─── READING PROGRESS ────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight);
  document.getElementById('reading-bar').style.width = (scrolled * 100) + '%';

  const scrollBtn = document.getElementById('scroll-top');
  scrollBtn.classList.toggle('visible', doc.scrollTop > 400);
});

// ─── INIT ────────────────────────────────────────────────────────────────────
loadFile();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .catch(err => console.warn('[SW] erro:', err));
}
</script>

</body>
</html>
